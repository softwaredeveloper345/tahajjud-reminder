name: Build Android AAB with EAS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Login to Expo (using EXPO_TOKEN secret)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas login --token $EXPO_TOKEN

      - name: Configure EAS (non-interactive)
        run: eas build:configure --non-interactive || true

      - name: Build Android AAB (production profile)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build -p android --profile production --non-interactive

      - name: Notes
        run: |
          echo "Build started. Monitor progress in GitHub Actions logs and the Expo dashboard if needed."

      - name: Prepare service account JSON (if provided)
        if: ${{ secrets.SERVICE_ACCOUNT_JSON != '' }}
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > ./service-account.json
          chmod 600 ./service-account.json

      - name: Submit to Play Store (if service account provided)
        if: ${{ secrets.SERVICE_ACCOUNT_JSON != '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Submitting latest build to Play Store using eas submit..."
          eas submit -p android --latest --service-account-json ./service-account.json --non-interactive
