name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      common_name:
        description: 'Keystore DN common name (CN)'
        required: false
        default: 'Tahajjud Reminder'
      organization_unit:
        description: 'Organizational unit (OU)'
        required: false
        default: 'Mobile'
      organization:
        description: 'Organization (O)'
        required: false
        default: 'Personal'
      locality:
        description: 'City/Locality (L)'
        required: false
        default: 'Istanbul'
      state:
        description: 'State/Province (ST)'
        required: false
        default: 'Istanbul'
      country_code:
        description: 'Country code (C)'
        required: false
        default: 'TR'
      alias:
        description: 'Key alias'
        required: false
        default: 'release-key'
  push:
    branches:
      - main
      - master

jobs:
  build-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate release keystore
        shell: bash
        run: |
          set -euo pipefail

          STORE_PASSWORD=$(openssl rand -hex 16)
          KEY_PASSWORD="$STORE_PASSWORD"
          ALIAS='${{ inputs.alias }}'
          KEYSTORE_FILE='release-key.keystore'
          DNAME="CN=${{ inputs.common_name }}, OU=${{ inputs.organization_unit }}, O=${{ inputs.organization }}, L=${{ inputs.locality }}, ST=${{ inputs.state }}, C=${{ inputs.country_code }}"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_FILE" \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "$DNAME"

          cat > keystore-details.txt <<EOF
keystore_file=$KEYSTORE_FILE
alias=$ALIAS
store_password=$STORE_PASSWORD
key_password=$KEY_PASSWORD
CN=${{ inputs.common_name }}
OU=${{ inputs.organization_unit }}
O=${{ inputs.organization }}
L=${{ inputs.locality }}
ST=${{ inputs.state }}
C=${{ inputs.country_code }}
EOF

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release-key.keystore
            keystore-details.txt
          if-no-files-found: error
