name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      common_name:
        description: 'Keystore DN common name (CN)'
        required: false
        default: 'Tahajjud Reminder'
      organization_unit:
        description: 'Organizational unit (OU)'
        required: false
        default: 'Mobile'
      organization:
        description: 'Organization (O)'
        required: false
        default: 'Personal'
      locality:
        description: 'City/Locality (L)'
        required: false
        default: 'Istanbul'
      state:
        description: 'State/Province (ST)'
        required: false
        default: 'Istanbul'
      country_code:
        description: 'Country code (C)'
        required: false
        default: 'TR'
      alias:
        description: 'Key alias'
        required: false
        default: 'release-key'
  push:
    branches:
      - main
      - master

jobs:
  build-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate release keystore
        shell: bash
        run: |
          set -euo pipefail

          STORE_PASSWORD=$(openssl rand -hex 16)
          KEY_PASSWORD="$STORE_PASSWORD"
          ALIAS='${{ inputs.alias }}'
          ALIAS="${ALIAS:-release-key}"
          KEYSTORE_FILE='release-key.keystore'
          DNAME="CN=${{ inputs.common_name }}, OU=${{ inputs.organization_unit }}, O=${{ inputs.organization }}, L=${{ inputs.locality }}, ST=${{ inputs.state }}, C=${{ inputs.country_code }}"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_FILE" \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "$DNAME"

          {
            printf 'keystore_file=%s\n' "$KEYSTORE_FILE"
            printf 'alias=%s\n' "$ALIAS"
            printf 'store_password=%s\n' "$STORE_PASSWORD"
            printf 'key_password=%s\n' "$KEY_PASSWORD"
            printf 'CN=%s\n' '${{ inputs.common_name }}'
            printf 'OU=%s\n' '${{ inputs.organization_unit }}'
            printf 'O=%s\n' '${{ inputs.organization }}'
            printf 'L=%s\n' '${{ inputs.locality }}'
            printf 'ST=%s\n' '${{ inputs.state }}'
            printf 'C=%s\n' '${{ inputs.country_code }}'
          } > keystore-details.txt

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release-key.keystore
            keystore-details.txt
          if-no-files-found: error
